name: Deploy to Production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
      - name: Add server host key
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy on production server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PASSWORD: ${{ secrets.ROMIRA_DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.ROMIRA_DB_ROOT_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no ${SERVER_USER}@${SERVER_HOST} bash << ENDSSH
          cd /var/www/romira
          git fetch origin main && git reset --hard origin/main
          {
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            echo "DB_NAME=romira_db"
            echo "DB_USER=romira_user"
            echo "DB_PASSWORD=${DB_PASSWORD}"
            echo "DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}"
          } > /var/www/romira/.env
          chmod +x /var/www/romira/deploy.sh
          cd /var/www/romira
          export \$(cat .env | xargs)
          bash /var/www/romira/deploy.sh
          ENDSSH